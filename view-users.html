<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory | Smart Parking</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h2 {
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* TABLE STYLING */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #111827;
            padding: 16px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(59, 130, 246, 0.05);
            transition: background 0.2s;
        }

        /* ID Badge Style */
        .id-badge {
            background: #0f172a;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        /* Avatar Placeholder */
        .avatar-circle {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--border);
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header-section">
        <h2><span>👥</span> User Directory</h2>
        <button class="refresh-btn" onclick="location.reload()">🔄 Refresh List</button>
    </div>

    <div class="table-wrapper">
        <table id="table">
            <thead>
                <tr>
                    <th style="width: 100px;">User ID</th>
                    <th>Full Name</th>
                    <th>Email Address</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data injected here -->
            </tbody>
        </table>
    </div>
</div>

<script>
let BASE_URL = "https://parking-backend-production-e6a9.up.railway.app";

// 🔥 LOAD USERS
fetch(BASE_URL + "/users/all")
.then(res => res.json())
.then(data => {
    let tableBody = document.getElementById("tableBody");

    data.forEach(u => {
        let row = tableBody.insertRow();

        // ID Cell with Badge
        let idCell = row.insertCell(0);
        idCell.innerHTML = `<span class="id-badge">#${u.id}</span>`;

        // Name Cell with Avatar Icon
        let nameCell = row.insertCell(1);
        let firstLetter = u.name ? u.name.charAt(0).toUpperCase() : '?';
        nameCell.innerHTML = `
            <div style="display: flex; align-items: center;">
                <div class="avatar-circle">${firstLetter}</div>
                ${u.name}
            </div>
        `;

        // Email Cell
        let emailCell = row.insertCell(2);
        emailCell.style.color = "#94a3b8";
        emailCell.innerText = u.email;
    });
})
.catch(() => {
    alert("Error loading users. Please check if the backend is running at " + BASE_URL);
});
</script>

</body>
</html>
