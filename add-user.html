<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New User | Smart Parking</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            text-align: center;
        }

        .icon-header {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .input-wrapper {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 6px;
            margin-left: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: var(--success);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 14px 0 rgba(34, 197, 94, 0.3);
        }

        button:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        #msg {
            margin-top: 25px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }
    </style>
</head>
<body>

<div class="form-card">
    <span class="icon-header">👤</span>
    <h2>Add New User</h2>

    <div class="input-wrapper">
        <label>Full Name</label>
        <input id="name" type="text" placeholder="e.g. Prajwal">
    </div>

    <div class="input-wrapper">
        <label>Email Address</label>
        <input id="email" type="email" placeholder="prajwal@example.com">
    </div>

    <div class="input-wrapper">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••">
    </div>

    <button onclick="addUser()">Create Account</button>

    <div id="msg"></div>
</div>

<script>
let BASE_URL = "https://parking-backend-production-29b5.up.railway.app";

function addUser() {
    const msgDiv = document.getElementById("msg");
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!name || !email || !password) {
        msgDiv.innerText = "⚠️ Please fill all fields";
        msgDiv.className = "error-msg";
        return;
    }

    let user = { name, email, password };

    msgDiv.innerText = "⏳ Saving user...";
    msgDiv.className = "";

    fetch(BASE_URL + "/users/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(user)
    })
    .then(res => res.json())
    .then(data => {
        msgDiv.className = "success-msg";
        msgDiv.innerHTML = `✅ User Added Successfully!<br><small>User ID: ${data.id}</small>`;
        
        // Clear inputs on success
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
    })
    .catch(() => {
        msgDiv.className = "error-msg";
        msgDiv.innerText = "❌ Connection error or user already exists";
    });
}
</script>

</body>
</html>
